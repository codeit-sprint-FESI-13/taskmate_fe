name: Preview 배포

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - develop

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    steps:
      - name: Github Repository 불러오기
        uses: actions/checkout@v5

      - name: pnpm 설치
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js 설치하기
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: 의존성(라이브러리) 설치
        run: pnpm install --frozen-lockfile

      - name: 테스트 실행하기
        run: pnpm run test

      # Vercel CLI를 GitHub Actions 환경에 설치
      - name: Vercel CLI 설치
        run: pnpm add --global vercel@latest

      # Vercel 프로젝트의 설정 및 환경변수를 로컬(GitHub Actions 환경)로 가져오는 명령
      - name: Vercel 환경 정보 가져오기
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # GitHub Actions에서 빌드 실행
      - name: 프로젝트 빌드
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # 이미 빌드된 결과물(--prebuilt)만 Vercel에 업로드
      - name: Vercel에 프로젝트 배포
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
